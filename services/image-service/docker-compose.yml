services:

  api:
    build: .
    container_name: fastapi_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      BUCKET_NAME: ${BUCKET_NAME}

  celery:
    build: .
    container_name: celery_worker
    command: celery -A app.tasks worker --loglevel=info -Q image_queue
    restart: always
    environment:
      BUCKET_NAME: ${BUCKET_NAME}